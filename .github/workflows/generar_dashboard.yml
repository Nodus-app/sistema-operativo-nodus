name: Actualizar Dashboard Operativo
on:
  push:
    paths:
      - 'data/*.xlsx'
      - 'data/*.xls'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas openpyxl xlrd
      - run: python generar_dashboard.py
      - run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add dashboard_operativo.html
          git stash
          git pull --rebase origin main
          git stash pop
          git add dashboard_operativo.html
          git diff --staged --quiet || git push
